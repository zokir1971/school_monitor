{% extends "base.html" %}

{% block title %}Выдача квот на регистрацию администраторов регионов{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', path='css/code.css') }}">
{% endblock %}

{% block content %}

<div class="card card--medium">

  <h2 class="card__title">Выдача квот L2 (администраторам района)</h2>

  {% if error %}
  <div id="error-box" class="alert alert--error">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/l1/issue-l2" class="form">

    <div class="form__section">
      <label class="checkbox checkbox--bold">
        <input type="checkbox" data-checkall="districts">
        Все регионы
      </label>

      <div class="districts-box">
        {% for d in districts %}
          <label class="checkbox">
            <input
              type="checkbox"
              data-checkitem="districts"
              name="district_ids"
              value="{{ d.id }}">
            {{ d.name }}
          </label>
        {% endfor %}
      </div>
    </div>

    <div class="form__section">
      <label class="form__label">Квота на каждый район</label>
      <input
        type="number"
        name="quota_total"
        min="1"
        value="1"
        class="form__input"
      >
    </div>

    <div class="form__actions">
      <button type="submit" class="btn btn--primary">
        Выдать коды
      </button>
    </div>

  </form>
</div>

<script>
// если выбран чек снимаем сообщение
  document.addEventListener("DOMContentLoaded", () => {
    const errorBox = document.getElementById("error-box");
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');

    if (!errorBox) return;

    checkboxes.forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) {
          errorBox.style.display = "none";
        }
      });
    });
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    function initCheckAll(group) {
      const selectAll = document.querySelector(`[data-checkall="${group}"]`);
      const items = Array.from(document.querySelectorAll(`[data-checkitem="${group}"]`));

      if (!selectAll || items.length === 0) return;

      // Когда жмём "выбрать всё"
      selectAll.addEventListener("change", () => {
        items.forEach(ch => { ch.checked = selectAll.checked; });
        selectAll.indeterminate = false;
      });

      // Когда меняем отдельные чекбоксы — синхронизируем "выбрать всё"
      const sync = () => {
        const allChecked = items.every(x => x.checked);
        const anyChecked = items.some(x => x.checked);

        selectAll.checked = allChecked;
        selectAll.indeterminate = anyChecked && !allChecked;
      };

      items.forEach(ch => ch.addEventListener("change", sync));
      sync(); // на случай, если часть уже отмечена при загрузке
    }

    // Авто-поиск всех групп на странице (без ручного списка)
    const groups = new Set();
    document.querySelectorAll("[data-checkall]").forEach(el => groups.add(el.getAttribute("data-checkall")));
    document.querySelectorAll("[data-checkitem]").forEach(el => groups.add(el.getAttribute("data-checkitem")));

    groups.forEach(initCheckAll);
  });
</script>

{% endblock %}
